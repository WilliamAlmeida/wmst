<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sem conexão — WMST</title>
    <style>
        :root { color-scheme: dark; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            font-family: 'Instrument Sans', system-ui, -apple-system, sans-serif;
            color: #e5e7eb;
            background:
                radial-gradient(60% 60% at 20% 20%, rgba(53, 194, 74, 0.18), transparent 60%),
                radial-gradient(55% 55% at 85% 30%, rgba(31, 51, 88, 0.75), transparent 60%),
                #0f1a30;
        }
        .card {
            max-width: 26rem;
            text-align: center;
        }
        img { width: 96px; height: 96px; margin: 0 auto 1.5rem; display: block; }
        h1 { font-size: 1.5rem; font-weight: 700; color: #fff; margin-bottom: 0.75rem; }
        p { font-size: 0.95rem; line-height: 1.6; color: #9ca3af; margin-bottom: 1.5rem; }
        button {
            border: 0;
            border-radius: 0.6rem;
            padding: 0.75rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            background: linear-gradient(90deg, #16233f, #1f3358 55%, #35c24a);
        }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="card">
        <img src="/icons/icon-192.png" alt="WMST">
        <h1>Você está sem conexão</h1>
        <p>Não foi possível carregar a página agora. Verifique sua internet e tente novamente.</p>
        <button onclick="location.reload()">Tentar de novo</button>
    </div>
</body>
</html>
